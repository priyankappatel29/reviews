<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>leave a review — priyanka.photos</title>
<meta property="og:description" content="how was your experience? share a few words about your photo session" />
<meta property="og:image" content="https://priyankappatel29.github.io/booking/Priyanka_Dark_Mode.png" />
<meta property="og:image:width" content="1080" />
<meta property="og:image:height" content="1080" />
<meta property="og:url" content="https://priyankappatel29.github.io/reviews/" />
<meta property="og:type" content="website" />
  
<link href="https://fonts.googleapis.com/css2?family=League+Gothic&family=Playfair+Display:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Tenor+Sans&display=swap" rel="stylesheet"/>
<style>
  :root {
    --navy:       #1d2735;
    --cream:      #fdece0;
    --cream-dim:  rgba(253,236,224,0.7);
    --cream-dark: #e8d5c0;
    --gold:       #c9a96e;
    --gold-light: #e8d5b0;
    --card-bg:    #243345;
    --card-border:rgba(253,236,224,0.09);
    --muted:      rgba(253,236,224,0.5);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--navy);
    color: var(--cream);
    font-family: 'Playfair Display', Georgia, serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 56px 24px 44px;
    position: relative;
    overflow: hidden;
    border-bottom: 1px solid rgba(201,169,110,0.15);
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 60% 0%, rgba(201,169,110,0.07) 0%, transparent 65%);
    pointer-events: none;
  }
  .header-logo {
    display: block;
    width: min(480px, 78vw);
    margin: 0 auto;
    opacity: 0;
    animation: fadeUp 0.7s 0.25s forwards;
  }

  main { max-width: 720px; margin: 0 auto; padding: 64px 24px 100px; }

  .step-label {
    font-size: 12px;
    text-transform: uppercase;
    font-family: 'Playfair Display', serif;
    font-weight: 300;
    font-style: italic;
    color: var(--cream);
    opacity: 0.6;
    margin-bottom: 10px;
  }
  .step-title {
    font-family: 'League Gothic', sans-serif;
    font-size: clamp(44px, 8vw, 60px);
    font-weight: 400;
    line-height: 1;
    text-transform: uppercase;
    color: var(--cream);
    margin-bottom: 12px;
  }
  .step-sub {
    font-size: 16px;
    font-family: 'Playfair Display', serif;
    font-weight: 300;
    font-style: italic;
    line-height: 1.6;
    color: var(--cream);
    opacity: 0.75;
    margin-bottom: 48px;
  }

  /* FIELDS */
  .field { margin-bottom: 28px; }
  .field-label {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    font-family: 'Playfair Display', serif;
    font-weight: 300;
    font-style: italic;
    letter-spacing: 0.06em;
    color: var(--cream);
    opacity: 0.6;
    margin-bottom: 10px;
  }
  input[type="text"], textarea {
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    padding: 14px 18px;
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--cream);
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
    border-radius: 0;
  }
  input[type="text"]::placeholder, textarea::placeholder {
    color: var(--muted);
    font-style: italic;
  }
  input[type="text"]:focus, textarea:focus {
    border-color: var(--gold);
  }
  textarea { min-height: 180px; resize: vertical; }

  /* RADIO CARDS */
  .radio-group { display: flex; flex-direction: column; gap: 8px; }
  .radio-card {
    border: 1px solid var(--card-border);
    background: var(--card-bg);
    padding: 14px 18px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.2s;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .radio-card::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0;
    height: 1px; background: var(--gold);
    transform: scaleX(0); transition: transform 0.3s;
    pointer-events: none;
  }
  .radio-card:hover { transform: translateY(-2px); }
  .radio-card:hover::after, .radio-card.selected::after { transform: scaleX(1); }
  .radio-card.selected { border-color: var(--gold); }
  .radio-card input[type="radio"] {
    width: 15px; height: 15px;
    flex-shrink: 0;
    accent-color: var(--gold);
    margin: 0; padding: 0;
    background: transparent;
    border: none;
  }
  .radio-card span {
    font-family: 'Playfair Display', serif;
    font-weight: 300;
    font-size: 15px;
    color: var(--cream);
    opacity: 0.85;
  }

  /* BUTTON */
  .btn-primary {
    display: inline-block;
    background: var(--cream);
    color: var(--navy);
    border: none;
    padding: 16px 48px;
    font-family: 'League Gothic', sans-serif;
    font-size: 22px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s;
    margin-top: 12px;
    text-decoration: none;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-2px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* SUCCESS */
  .success-wrap {
    text-align: center;
    padding: 40px 0;
    display: none;
  }
  .success-icon {
    font-size: 32px;
    color: var(--gold);
    margin-bottom: 24px;
  }
  .success-wrap h2 {
    font-family: 'League Gothic', sans-serif;
    font-size: clamp(44px, 8vw, 60px);
    text-transform: uppercase;
    color: var(--cream);
    margin-bottom: 16px;
    line-height: 1;
  }
  .success-wrap p {
    font-size: 16px;
    font-style: italic;
    font-weight: 300;
    color: var(--cream);
    opacity: 0.75;
    line-height: 1.7;
    max-width: 480px;
    margin: 0 auto 28px;
  }

  .footer-note {
    text-align: center;
    font-size: 13px;
    font-style: italic;
    font-weight: 300;
    color: var(--cream);
    opacity: 0.4;
    margin-top: 60px;
  }
  .footer-note a { color: var(--gold); text-decoration: none; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* HERO */
  .booking-hero {
  display: flex;
  width: 100%;
  padding: 0 24px;
  margin: 0 0 24px 0;
  box-sizing: border-box;
}
  .hero-left {
    flex: 0.6;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-right: 24px;
  }
  .hero-title {
    font-family: 'League Gothic', sans-serif;
    font-size: clamp(64px, 10vw, 96px);
    font-weight: 400;
    line-height: 0.92;
    text-transform: uppercase;
    color: var(--cream);
    letter-spacing: -0.01em;
  }
  .hero-gold-line {
    width: 48px;
    height: 1px;
    background: var(--gold);
    margin: 20px 0;
  }
  .hero-sub {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-style: italic;
    font-weight: 300;
    color: var(--cream);
    opacity: 0.55;
    line-height: 1.7;
  }
  .hero-right {
    flex: 1.4;
    position: relative;
    min-height: 380px;
    height: 380px;
  }
  .hero-img-tall {
    position: absolute;
    left: 0;
    top: 0;
    width: 54%;
    height: 100%;
    overflow: hidden;
  }
  .hero-img-tall img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }
  .hero-img-wide {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 62%;
    height: 80%;
    overflow: hidden;
    border: 3px solid var(--navy);
  }
  .hero-img-wide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  @media (max-width: 600px) {
    .booking-hero {
      flex-direction: column;
      gap: 28px;
      margin-bottom: 36px;
      padding: 0 16px;
    }
    .hero-left { padding-right: 0; }
    .hero-right { min-height: 220px; }
    .hero-title { font-size: 64px; }
  }
</style>
</head>
<body>

<header>
  <div class="booking-hero" id="bookingHero">
    <div class="hero-left">
	<img src="logo.png" alt="Priyanka Patel Photography" class="header-logo" />
      <div class="hero-sub">calgary & beyond</div>
    </div>
    <div class="hero-right">
      <div class="hero-img-tall">
        <img src="https://photos.smugmug.com/Weddings-Gallery/i-XtVH4bV/0/KPVKkZ3rJ4kzhgt6Kxs3MwKLMTW8gF7XzPHLLSRdR/X5/03_02_24_17_16_21-X5.jpg" alt="Priyanka Patel Photography" />
      </div>
      <div class="hero-img-wide">
        <img src="https://photos.smugmug.com/Home-Page/i-TrnNBjs/0/LrcxwnqXCPjG6FnBhrRp4cfdqtp5sC9q6PWpqgpG3/4K/22_05_26_20_51_43-4K.jpg" alt="Priyanka Patel Photography" />
      </div>
    </div>
</header>

<main>
  <div id="formWrap">
    <h1 class="step-title">leave a review</h1>
    <p class="step-sub">thank you for trusting me with your moments. i'd love to hear how it went. </p>

    <div class="field">
      <label class="field-label">your name</label>
      <input type="text" id="f-name" placeholder="iris west" />
    </div>

    <div class="field">
      <label class="field-label">how happy were you with the final photos?</label>
      <div class="radio-group">
        <label class="radio-card"><input type="radio" name="happy" value="Obsessed" /><span>obsessed</span></label>
        <label class="radio-card"><input type="radio" name="happy" value="Really happy" /><span>really happy</span></label>
        <label class="radio-card"><input type="radio" name="happy" value="Happy" /><span>happy</span></label>
        <label class="radio-card"><input type="radio" name="happy" value="Expected more" /><span>expected more</span></label>
      </div>
    </div>

    <div class="field">
      <label class="field-label">would you refer me to a friend?</label>
      <div class="radio-group">
        <label class="radio-card"><input type="radio" name="refer" value="Already have" /><span>already have</span></label>
        <label class="radio-card"><input type="radio" name="refer" value="Yes" /><span>yes</span></label>
        <label class="radio-card"><input type="radio" name="refer" value="Maybe" /><span>maybe</span></label>
      </div>
    </div>

    <div class="field">
      <label class="field-label">your review</label>
      <textarea id="f-review" placeholder="share your experience..."></textarea>
    </div>

    <div class="field">
      <label class="field-label">anything you'd change? <em style="opacity:0.5">(optional)</em></label>
      <input type="text" id="f-change" placeholder="optional" />
    </div>

    <button class="btn-primary" id="submit-btn">Submit</button>
  </div>

  <div class="success-wrap" id="successWrap">
    <div class="success-icon">✦</div>
    <h2>thank you!</h2>
    <p>your review has been received and i'm so grateful. — priyanka</p>
    <a href="https://www.priyanka.photos" class="btn-primary">← Back to website</a>
  </div>

  <p class="footer-note"><a href="https://www.priyanka.photos">priyanka.photos</a></p>
</main>

<script>
  document.querySelectorAll('.radio-card').forEach(function(card) {
    card.addEventListener('click', function() {
      var name = card.querySelector('input[type="radio"]').name;
      document.querySelectorAll('input[name="' + name + '"]').forEach(function(r) {
        r.closest('.radio-card').classList.remove('selected');
      });
      card.classList.add('selected');
    });
  });

  document.getElementById('submit-btn').addEventListener('click', function() {
    var name = document.getElementById('f-name').value.trim();
    var review = document.getElementById('f-review').value.trim();
    var happy = (document.querySelector('input[name="happy"]:checked') || {}).value || '';
    var refer = (document.querySelector('input[name="refer"]:checked') || {}).value || '';
    var change = document.getElementById('f-change').value.trim();
    var btn = document.getElementById('submit-btn');

    if (!name || !review) {
      alert('Please fill in your name and review.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Submitting...';

    fetch('https://formspree.io/f/xdarqoez', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        _subject: 'New Review — ' + name,
        name: name,
        review: review,
        happy: happy,
        refer: refer,
        change: change
      })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.ok) {
        document.getElementById('formWrap').style.display = 'none';
        document.getElementById('successWrap').style.display = 'block';
      } else {
        btn.disabled = false;
        btn.textContent = 'Submit Review';
        alert('Something went wrong, please try again.');
      }
    })
    .catch(function() {
      btn.disabled = false;
      btn.textContent = 'Submit Review';
      alert('Something went wrong, please try again.');
    });
  });
</script>
</body>
</html>
